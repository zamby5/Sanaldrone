<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gayrimenkul 3D Drone Analiz Pro</title>
    
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    
    <style>
        :root { --gold: #f59e0b; --dark: #111827; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        .panel {
            position: absolute; top: 15px; left: 15px; width: 320px;
            background: rgba(17, 24, 39, 0.9); backdrop-filter: blur(15px);
            border-radius: 12px; border: 1px solid rgba(245, 158, 11, 0.3);
            padding: 20px; z-index: 10; color: white; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .select-box { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: var(--gold); margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        select { 
            width: 100%; padding: 12px; border-radius: 8px; background: #1f2937; 
            color: white; border: 1px solid #374151; cursor: pointer; font-size: 14px;
        }

        .btn-drone { 
            width: 100%; background: var(--gold); color: #000; padding: 15px; 
            border: none; border-radius: 8px; font-weight: 800; cursor: pointer;
            transition: 0.3s; margin-top: 10px; text-transform: uppercase;
        }
        .btn-drone:hover { background: #fbbf24; transform: translateY(-2px); }
        .btn-drone:disabled { background: #4b5563; opacity: 0.5; cursor: not-allowed; }

        .footer-info { font-size: 11px; color: #9ca3af; margin-top: 15px; text-align: center; border-top: 1px solid #374151; padding-top: 10px; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="panel">
    <h3 style="margin:0 0 20px 0; color:var(--gold); display:flex; align-items:center; gap:8px;">
        🚁 Profesyonel Portföy Turu
    </h3>
    
    <div class="select-box">
        <label>Şehir</label>
        <select id="city" onchange="loadDistricts()">
            <option value="">İl Seçiniz...</option>
        </select>
    </div>

    <div class="select-box">
        <label>İlçe / Bölge</label>
        <select id="district" onchange="focusLocation()">
            <option value="">Önce İl Seçin...</option>
        </select>
    </div>

    <button id="droneBtn" class="btn-drone" onclick="toggleDrone()" disabled>Drone Turunu Başlat</button>
    
    <div class="footer-info">
        Parseli seçmek için haritaya dokunun.
    </div>
</div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoibWFwYm94YXBpIiwiYSI6ImNqZ3oxZXVrNDA3NTkzMnFpMzh3YmFhNXoifQ.m9vCqLpC3A9uI7IOfvEwOQ';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/satellite-streets-v12',
        center: [35.2433, 38.9637], // Türkiye Geneli
        zoom: 5,
        pitch: 0,
        antialias: true
    });

    let isRotating = false;
    let marker = new mapboxgl.Marker({ color: "#f59e0b" });

    // Türkiye İller ve Koordinatlar (Özet Liste - Hız için)
    const cityData = {
        "Antalya": [30.7133, 36.8969, ["Kepez", "Muratpaşa", "Konyaaltı", "Alanya", "Lara", "Döşemealtı"]],
        "İstanbul": [28.9784, 41.0082, ["Beşiktaş", "Kadıköy", "Levent", "Ataşehir", "Esenyurt", "Başakşehir"]],
        "Ankara": [32.8541, 39.9334, ["Çankaya", "Keçiören", "Yenimahalle", "Gölbaşı"]],
        "İzmir": [27.1428, 38.4237, ["Konak", "Bornova", "Karşıyaka", "Çeşme"]],
        "Mersin": [34.6333, 36.8000, ["Mezitli", "Yenişehir", "Tarsus"]]
    };

    const citySelect = document.getElementById('city');
    Object.keys(cityData).sort().forEach(c => {
        citySelect.innerHTML += `<option value="${c}">${c}</option>`;
    });

    function loadDistricts() {
        const city = citySelect.value;
        const distSelect = document.getElementById('district');
        distSelect.innerHTML = '<option value="">İlçe Seçiniz...</option>';
        
        if (cityData[city]) {
            cityData[city][2].forEach(d => {
                distSelect.innerHTML += `<option value="${d}">${d}</option>`;
            });
            map.flyTo({ center: [cityData[city][0], cityData[city][1]], zoom: 10, pitch: 0 });
        }
    }

    async function focusLocation() {
        const city = citySelect.value;
        const district = document.getElementById('district').value;
        const query = `${district}, ${city}, Turkey`;
        
        const response = await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?access_token=${mapboxgl.accessToken}`);
        const data = await response.json();
        
        if (data.features && data.features.length > 0) {
            const coords = data.features[0].center;
            map.flyTo({ center: coords, zoom: 15, pitch: 45, speed: 1.2 });
        }
    }

    map.on('click', (e) => {
        marker.setLngLat(e.lngLat).addTo(map);
        document.getElementById('droneBtn').disabled = false;
        map.flyTo({ center: e.lngLat, zoom: 18, pitch: 75, duration: 2000 });
    });

    function toggleDrone() {
        isRotating = !isRotating;
        const btn = document.getElementById('droneBtn');
        if (isRotating) {
            btn.innerText = "⏹ Turu Durdur";
            btn.style.background = "#ef4444";
            rotate(0);
        } else {
            btn.innerText = "Drone Turunu Başlat";
            btn.style.background = "#f59e0b";
        }
    }

    function rotate(t) {
        if (!isRotating) return;
        map.rotateTo((t / 150) % 360, { duration: 0 });
        requestAnimationFrame(rotate);
    }

    map.on('load', () => {
        map.addLayer({
            'id': '3d-buildings',
            'source': 'composite', 'source-layer': 'building',
            'type': 'fill-extrusion', 'minzoom': 15,
            'paint': {
                'fill-extrusion-color': '#444',
                'fill-extrusion-height': ['get', 'height'],
                'fill-extrusion-opacity': 0.5
            }
        });
    });
</script>
</body>
</html>
