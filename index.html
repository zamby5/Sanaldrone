<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Parsel PRO V9</title>

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f7fc}
#map{position:absolute;top:0;bottom:0;width:100%}

.panel{
position:absolute;top:10px;left:10px;background:#fff;
padding:10px;border-radius:10px;width:260px;
box-shadow:0 10px 25px rgba(0,0,0,.12)
}

select,input,button{
width:100%;margin:4px 0;padding:6px;border-radius:6px;border:1px solid #ddd
}

button{background:#1a4fa0;color:#fff;font-weight:bold;border:none}

#info{
position:absolute;bottom:10px;left:10px;background:#fff;
padding:10px;border-radius:10px;font-size:12px
}

#panelUser{
position:absolute;top:10px;right:10px;background:#fff;
padding:10px;border-radius:10px;width:220px;
box-shadow:0 10px 25px rgba(0,0,0,.12)
}

.pin{
width:12px;height:12px;background:red;border-radius:50%;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(255,0,0,0.7);}
70%{box-shadow:0 0 0 15px rgba(255,0,0,0);}
100%{box-shadow:0 0 0 0 rgba(255,0,0,0);}
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
<select id="il"></select>
<select id="ilce"></select>
<select id="mahalle"></select>

<input id="ada" placeholder="Ada">
<input id="parsel" placeholder="Parsel">

<button onclick="start()">PARSEL GETİR</button>
</div>

<div id="panelUser">
<b>İlan Paneli</b>
<input id="ilanTitle" placeholder="Başlık">
<button onclick="saveIlan()">Kaydet</button>
<div id="ilanList"></div>
</div>

<div id="info">Hazır</div>

<script>

const WORKER = "https://tkgm-proxy.miyicioglu.workers.dev";

let map,POI=[];

// MAP
function init(){
map=new maplibregl.Map({
container:'map',
style:{
version:8,
sources:{osm:{type:"raster",tiles:["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],tileSize:256}},
layers:[{id:"osm",type:"raster",source:"osm"}]
},
center:[30.65,36.87],
zoom:12
});
}

// DROPDOWN
async function loadIl(){
let r=await fetch(WORKER+"/il");
let d=await r.json();
let sel=document.getElementById("il");
d.forEach(x=>{
sel.innerHTML+=`<option value="${x.id}">${x.ad}</option>`;
});
loadIlce();
}

async function loadIlce(){
let il=document.getElementById("il").value;
let r=await fetch(WORKER+"/ilce/"+il);
let d=await r.json();
let sel=document.getElementById("ilce");
sel.innerHTML="";
d.forEach(x=>{
sel.innerHTML+=`<option value="${x.id}">${x.ad}</option>`;
});
loadMahalle();
}

async function loadMahalle(){
let ilce=document.getElementById("ilce").value;
let r=await fetch(WORKER+"/mahalle/"+ilce);
let d=await r.json();
let sel=document.getElementById("mahalle");
sel.innerHTML="";
d.forEach(x=>{
sel.innerHTML+=`<option value="${x.id}">${x.ad}</option>`;
});
}

// START
async function start(){

init();

let ilce=document.getElementById("ilce").value;
let mahalle=document.getElementById("mahalle").value;
let ada=document.getElementById("ada").value;
let parsel=document.getElementById("parsel").value;

let url=`${WORKER}/parsel/${ilce}/${mahalle}/${ada}/${parsel}`;

let r=await fetch(url);
let data=await r.json();

let coords=data.geometry.coordinates[0];

map.addSource("parcel",{type:"geojson",data:{type:"Feature",geometry:{type:"Polygon",coordinates:[coords]}}});

map.addLayer({id:"fill",type:"fill",source:"parcel",paint:{'fill-color':'#00aaff','fill-opacity':0.4}});
map.addLayer({id:"line",type:"line",source:"parcel",paint:{'line-color':'#0077aa','line-width':2}});

let center=[(data.properties.minLon+data.properties.maxLon)/2,(data.properties.minLat+data.properties.maxLat)/2];

let el=document.createElement("div");
el.className="pin";
new maplibregl.Marker(el).setLngLat(center).addTo(map);

// POI DRONE
POI=[[center[0]+0.001,center[1]],[center[0]-0.001,center[1]],[center[0],center[1]+0.001],[center[0],center[1]-0.001]];

let i=0;
setInterval(()=>{
map.flyTo({center:POI[i],zoom:18,speed:0.5});
i++; if(i>=POI.length)i=0;
},3000);

// AI
let area=data.properties.alan||300;
let score=area>500?7:4;
let value=Math.round(area*(1500+score*400));

document.getElementById("info").innerHTML=`
Alan: ${area} m²<br>
Değer: ${value} ₺<br>
Skor: ${score}/10<br><br>
Developed by Murat İyicioğlu
`;

}

// USER PANEL
function saveIlan(){
let title=document.getElementById("ilanTitle").value;
let list=JSON.parse(localStorage.getItem("ilanlar")||"[]");
list.push(title);
localStorage.setItem("ilanlar",JSON.stringify(list));
loadIlan();
}

function loadIlan(){
let list=JSON.parse(localStorage.getItem("ilanlar")||"[]");
let div=document.getElementById("ilanList");
div.innerHTML="";
list.forEach((x,i)=>{
div.innerHTML+=`<div>${x} <button onclick="delIlan(${i})">X</button></div>`;
});
}

function delIlan(i){
let list=JSON.parse(localStorage.getItem("ilanlar")||"[]");
list.splice(i,1);
localStorage.setItem("ilanlar",JSON.stringify(list));
loadIlan();
}

// INIT
loadIl();
loadIlan();

document.getElementById("il").onchange=loadIlce;
document.getElementById("ilce").onchange=loadMahalle;

</script>

</body>
  </html>
