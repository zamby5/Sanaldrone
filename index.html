<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanal Drone Pro v2.0</title>
    
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        .ui-panel {
            position: absolute; top: 20px; left: 20px; width: 320px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 20px; z-index: 10; border-top: 4px solid #f59e0b;
        }

        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { background: #1f2937; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        
        .btn-action { width: 100%; background: #f59e0b; color: #000; padding: 12px; margin-top: 10px; font-size: 14px; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-action:hover { background: #d97706; transform: translateY(-2px); }
        
        .status-badge { font-size: 11px; color: #666; margin-top: 10px; display: flex; align-items: center; gap: 5px; }
        .dot { height: 8px; width: 8px; background-color: #10b981; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel">
    <h3 style="margin-top:0; color:#1f2937;">3D Portföy Analizi</h3>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="İl, İlçe veya Mahalle...">
        <button onclick="search()">Git</button>
    </div>
    
    <div style="font-size: 13px; color: #4b5563;">Haritadan parseli seçin ve dronu başlatın.</div>
    
    <button id="droneBtn" class="btn-action" onclick="startDrone()">🚀 Drone Turunu Başlat</button>
    
    <div class="status-badge">
        <span class="dot"></span> Uydu Görüntüsü Aktif (HD)
    </div>
</div>

<script>
    // Ücretsiz Mapbox Token - Kendi projen için daha sonra değiştirebilirsin
    mapboxgl.accessToken = 'pk.eyJ1IjoibWFwYm94YXBpIiwiYSI6ImNqZ3oxZXVrNDA3NTkzMnFpMzh3YmFhNXoifQ.m9vCqLpC3A9uI7IOfvEwOQ';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/satellite-streets-v12',
        center: [30.7133, 36.8969],
        zoom: 13,
        pitch: 60,
        bearing: -20,
        antialias: true
    });

    let isRotating = false;
    let marker = new mapboxgl.Marker({ color: "#f59e0b" });

    map.on('load', () => {
        // 3D Arazi (Terrain) ekle
        map.addSource('mapbox-dem', {
            'type': 'raster-dem',
            'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
            'tileSize': 512,
            'maxzoom': 14
        });
        map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1.5 });

        // 3D Binaları ekle
        map.addLayer({
            'id': '3d-buildings',
            'source': 'composite',
            'source-layer': 'building',
            'filter': ['==', 'extrude', 'true'],
            'type': 'fill-extrusion',
            'minzoom': 15,
            'paint': {
                'fill-extrusion-color': '#aaa',
                'fill-extrusion-height': ['get', 'height'],
                'fill-extrusion-base': ['get', 'min_height'],
                'fill-extrusion-opacity': 0.6
            }
        });
    });

    map.on('click', (e) => {
        marker.setLngLat(e.lngLat).addTo(map);
        map.flyTo({
            center: e.lngLat,
            zoom: 17.5,
            pitch: 75,
            duration: 2000
        });
    });

    function startDrone() {
        if (!marker.getLngLat()) return alert("Lütfen önce haritadan bir parsel seçin!");
        
        isRotating = !isRotating;
        const btn = document.getElementById('droneBtn');
        
        if (isRotating) {
            btn.innerText = "⏹ Turu Durdur";
            rotateCamera(0);
        } else {
            btn.innerText = "🚀 Drone Turunu Başlat";
        }
    }

    function rotateCamera(timestamp) {
        if (!isRotating) return;
        map.rotateTo((timestamp / 100) % 360, { duration: 0 });
        requestAnimationFrame(rotateCamera);
    }

    async function search() {
        const q = document.getElementById('searchInput').value;
        const response = await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${q}.json?access_token=${mapboxgl.accessToken}`);
        const data = await response.json();
        if (data.features.length > 0) {
            map.flyTo({ center: data.features[0].center, zoom: 15 });
        }
    }
</script>

</body>
</html>
