<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profesyonel Drone Analiz Sistemi</title>
    
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" type="text/css">
    
    <style>
        :root { --gold: #f59e0b; --dark: #0f172a; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #000; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        .ui-container {
            position: absolute; top: 15px; left: 15px; width: 350px;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px);
            border-radius: 12px; border: 1px solid rgba(245, 158, 11, 0.4);
            padding: 20px; z-index: 10; color: white; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        /* Arama Kutusunu Özelleştirme */
        .mapboxgl-ctrl-geocoder { 
            width: 100% !important; max-width: none !important; 
            background-color: #1e293b !important; border-radius: 8px !important;
            border: 1px solid #334155 !important;
        }
        .mapboxgl-ctrl-geocoder--input { color: white !important; }
        .mapboxgl-ctrl-geocoder--icon-search { fill: var(--gold) !important; }

        .btn-drone { 
            width: 100%; background: var(--gold); color: #000; padding: 16px; 
            border: none; border-radius: 8px; font-weight: 800; cursor: pointer;
            transition: 0.3s; margin-top: 20px; font-size: 15px; text-transform: uppercase;
        }
        .btn-drone:hover { background: #fbbf24; transform: scale(1.02); }
        .btn-drone:disabled { background: #475569; opacity: 0.5; cursor: not-allowed; }

        .steps { font-size: 12px; color: #94a3b8; margin-top: 15px; padding-left: 0; list-style: none; }
        .steps li { margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .steps b { color: var(--gold); }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-container">
    <div style="text-align:center; margin-bottom: 20px;">
        <h2 style="margin:0; color:var(--gold); font-size: 18px; letter-spacing: 1px;">3D PORTFÖY RADARI</h2>
        <div style="font-size: 9px; color: #94a3b8; margin-top: 4px; font-weight: bold;">TURYAP QUEEN ÖZEL SÜRÜM</div>
    </div>
    
    <div id="geocoder" class="geocoder"></div>

    <ul class="steps">
        <li><b>1.</b> Mahalle veya sokak adını yazıp seçin.</li>
        <li><b>2.</b> Haritadan parselin üzerine <b>dokunun</b>.</li>
        <li><b>3.</b> Aşağıdaki butona basarak uçuşu başlatın.</li>
    </ul>

    <button id="droneBtn" class="btn-drone" onclick="toggleDrone()" disabled>🚀 DRONE SİMÜLASYONUNU BAŞLAT</button>
</div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoibWFwYm94YXBpIiwiYSI6ImNqZ3oxZXVrNDA3NTkzMnFpMzh3YmFhNXoifQ.m9vCqLpC3A9uI7IOfvEwOQ';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/satellite-streets-v12',
        center: [30.7133, 36.8969], // Başlangıç Antalya
        zoom: 12,
        pitch: 60,
        antialias: true
    });

    // Canlı Arama Motoru (Geocoder)
    const geocoder = new MapboxGeocoder({
        accessToken: mapboxgl.accessToken,
        mapboxgl: mapboxgl,
        placeholder: 'Mahalle, sokak veya bina...',
        countries: 'tr', // Sadece Türkiye sonuçları
        language: 'tr'
    });

    document.getElementById('geocoder').appendChild(geocoder.onAdd(map));

    let isRotating = false;
    let marker = new mapboxgl.Marker({ color: "#f59e0b" });

    // 3D Binaları Yükle
    map.on('load', () => {
        map.addLayer({
            'id': '3d-buildings',
            'source': 'composite', 'source-layer': 'building',
            'type': 'fill-extrusion', 'minzoom': 15,
            'paint': {
                'fill-extrusion-color': '#aaa',
                'fill-extrusion-height': ['get', 'height'],
                'fill-extrusion-opacity': 0.6
            }
        });
    });

    // Haritaya tıklandığında hedefi belirle
    map.on('click', (e) => {
        marker.setLngLat(e.lngLat).addTo(map);
        document.getElementById('droneBtn').disabled = false;
        map.flyTo({ center: e.lngLat, zoom: 18, pitch: 80, duration: 2000 });
    });

    function toggleDrone() {
        isRotating = !isRotating;
        const btn = document.getElementById('droneBtn');
        if (isRotating) {
            btn.innerText = "⏹ UÇUŞU DURDUR";
            btn.style.background = "#ef4444";
            rotate(0);
        } else {
            btn.innerText = "🚀 DRONE SİMÜLASYONUNU BAŞLAT";
            btn.style.background = "#f59e0b";
        }
    }

    function rotate(t) {
        if (!isRotating) return;
        map.rotateTo((t / 120) % 360, { duration: 0 });
        requestAnimationFrame(rotate);
    }
</script>
</body>
</html>
